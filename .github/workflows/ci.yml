name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Validate, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # A+ P0.4: fail the gate on a HIGH+ vulnerability in a PRODUCTION dependency
      # (e.g. the dompurify advisory behind the gallery XSS floor). Dev-only
      # advisories (esbuild/vite dev server) are excluded via --omit=dev and tracked
      # separately — they require a breaking major bump.
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      # Fail fast on data corruption: duplicate object keys silently
      # overwrite earlier definitions in JS, so a regression here would
      # quietly distort the simulation outputs without breaking the build.
      - name: Validate data
        run: npm run validate:data

      - name: Validate edge functions
        run: npm run validate:edge

      - name: Validate vendored map JavaScript
        run: npm run validate:map

      # tsc --noEmit against src/domain/. The JSDoc types in the domain
      # layer get validated by tsc; the pipeline output object shapes,
      # impairment dimensions, event types, and faction-response shapes
      # are all enforced at edit time. Adding a new event without
      # updating EventType union fails here.
      - name: Type check
        run: npm run typecheck

      # ESLint on the full src/ + tests + scripts. Correctness rules
      # (undefined vars, dupe keys, rules-of-hooks, the design-token and
      # analytics-event contracts) are errors; forward-looking React 19
      # rules and unused-vars are warnings, surfaced for drift tracking
      # without blocking. The tree currently lints clean (0 problems).
      # Promote the React 19 warnings to errors when adopting React Compiler.
      - name: Lint
        run: npm run lint

      # Vitest: unit + property-based (fast-check) engine tests, domain +
      # store + lib integration, component/UI smoke, a11y, security, and
      # edge-function contract tests. ~2,600 tests across ~170 files.
      - name: Run tests
        run: npm run test

      # Production build — confirms Vite/Rollup chunking is healthy, the
      # bundle still produces, and (via the vite.config onwarn guard) that
      # no named import is missing/unresolved. NOTE: Vercel currently
      # deploys on push to master independently of this workflow — see
      # docs/DEPLOY.md ("Gating production on CI") to make this check a
      # required gate before a production deploy.
      - name: Build
        run: npm run build

  e2e:
    name: Chromium end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium + webkit)
        # webkit powers the mobile-safari project (iPhone 13 profile) used by
        # the "Audit mobile pointer targets" step below — without it that step
        # fails at browser launch ("Executable doesn't exist … webkit").
        run: npx playwright install --with-deps chromium webkit

      - name: Run Chromium E2E
        run: npx playwright test --project=chromium

      - name: Audit mobile pointer targets
        run: npx playwright test e2e/mobile-pointer-targets.spec.js --project=mobile-safari

  # Execution tests for the Supabase edge functions (Deno runtime, not vitest).
  # The money-path trust boundaries (stripe-webhook signature verification; later
  # the generate-narrative refund decision) are RUN here against forged vs. signed
  # requests — the regex-over-source contracts in vitest can't prove behavior.
  deno-tests:
    name: Edge function execution tests (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run edge-function Deno tests
        run: deno task test:edge
