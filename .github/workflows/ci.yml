name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Validate, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # A+ P0.4: fail the gate on a HIGH+ vulnerability in a PRODUCTION dependency
      # (e.g. the dompurify advisory behind the gallery XSS floor). NOTE: --omit=dev
      # is a RUNTIME-ONLY filter, not a toolchain-safety guarantee — it excludes the
      # build toolchain (esbuild/vite/rollup/postcss/autoprefixer), which produces
      # the shipped bytes. The non-blocking "full audit" step below surfaces those
      # build-toolchain advisories (many need a breaking major bump, so they don't
      # block here) so a supply-chain compromise in the toolchain is at least visible.
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      # Build-toolchain + dev-dependency advisories. Non-blocking (|| true) because
      # they often require a breaking major and shouldn't wedge the gate — but they
      # ARE printed in the log so esbuild/vite/rollup advisories are no longer a
      # blind spot. Promote to blocking once the toolchain is on advisory-clean pins.
      - name: Audit full dependency tree (build toolchain — non-blocking)
        run: npm audit --audit-level=high || true

      # Fail fast on data corruption: duplicate object keys silently
      # overwrite earlier definitions in JS, so a regression here would
      # quietly distort the simulation outputs without breaking the build.
      - name: Validate data
        run: npm run validate:data

      - name: Validate edge functions
        run: npm run validate:edge

      - name: Validate vendored map JavaScript
        run: npm run validate:map

      # tsc --noEmit against src/domain/. The JSDoc types in the domain
      # layer get validated by tsc; the pipeline output object shapes,
      # impairment dimensions, event types, and faction-response shapes
      # are all enforced at edit time. Adding a new event without
      # updating EventType union fails here.
      - name: Type check
        run: npm run typecheck

      # Domain STRICT gate: tsc with strict flags over src/domain (+ the
      # generation path) against a frozen baseline of allowed errors, so new
      # strict violations can't sneak in. `npm run check` and the pre-push hook
      # already run this; CI ran `typecheck` but NOT this, leaving a parity gap
      # where a strict regression could land on master green. Closed here.
      - name: Type check (domain strict)
        run: npm run typecheck:domain:strict

      # ESLint on the full src/ + tests + scripts, run with `--max-warnings 0`
      # so a WARNING is now blocking too (not just errors) — a new stale-closure
      # (react-hooks/exhaustive-deps) or accidental setState-in-effect can no
      # longer slip through green. The tree is warning-clean; the few legitimate
      # forward-looking-rule sites (data-load / debounce / reset effects) carry a
      # co-located, justified eslint-disable rather than a blanket suppression.
      - name: Lint
        run: npm run lint

      # Vitest: unit + property-based (fast-check) engine tests, domain +
      # store + lib integration, component/UI smoke, a11y, security, and
      # edge-function contract tests. The exact count grows every PR — see this
      # step's log for the live total rather than a number that rots in a comment.
      - name: Run tests
        run: npm run test

      # Production build — confirms Vite/Rollup chunking is healthy, the
      # bundle still produces, and (via the vite.config onwarn guard) that
      # no named import is missing/unresolved. This job's conclusion ("Validate,
      # test, build") is a REQUIRED check for the Vercel deploy gate: the
      # fail-closed ignoreCommand (scripts/vercel-ignore-build.mjs, wired in
      # vercel.json) blocks any production/preview deploy unless this job — plus
      # the e2e and deno-tests jobs — are green on the deploying commit. See
      # docs/DEPLOY.md ("Gating production on CI") for the operator token setup.
      - name: Build
        run: npm run build

      # Post-build verification: the vendor-pdf lazy-chunk contract reads the
      # built dist/ graph (chunk isolation + modulepreload filter). In the unit
      # pass above dist/ doesn't exist yet, so that suite is `runIf(distExists)`
      # and silently NO-OPs — re-run it here AFTER the build with VERIFY_DIST=1,
      # which turns a missing dist/ into a HARD failure so the chunk contract can
      # never count green having verified nothing.
      - name: Verify vendor-pdf lazy chunk (post-build, anti-vacuity)
        run: npx vitest run tests/build/vendorPdfLazy.test.js
        env:
          VERIFY_DIST: '1'

  e2e:
    name: Chromium end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium + webkit)
        # webkit powers the mobile-safari project (iPhone 13 profile) used by
        # the "Audit mobile pointer targets" step below — without it that step
        # fails at browser launch ("Executable doesn't exist … webkit").
        run: npx playwright install --with-deps chromium webkit

      # ANTI-VACUITY (review #1 trust fix): a required Playwright step counted
      # GREEN while running ZERO assertions (the mobile spec's
      # `test.skip(!isMobile)` guard means a renamed/typo'd project skips every
      # test and Playwright still exits 0). This STATIC guard asserts each
      # project resolves to >0 discovered specs BEFORE we run — a moved spec or a
      # renamed project fails the job here instead of going green-on-nothing.
      - name: Assert E2E projects discover specs (anti-vacuity, static)
        run: |
          node scripts/check-e2e-not-vacuous.mjs --project=chromium --projects chromium
          node scripts/check-e2e-not-vacuous.mjs e2e/mobile-pointer-targets.spec.js --project=mobile-safari --projects mobile-safari

      - name: Run Chromium E2E
        # Emit a JSON report alongside the run (--reporter github,json keeps the
        # readable GitHub annotations) so the RUNTIME anti-vacuity guard below can
        # prove the run actually executed tests (not all-skipped).
        run: npx playwright test --project=chromium --reporter=github,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-chromium.json

      # RUNTIME anti-vacuity guard: fail HARD if the chromium run executed 0 real
      # tests (`expected:0`) — i.e. everything was skipped but Playwright exited
      # 0. This is the ratchet that makes "green-on-nothing" impossible.
      - name: Assert Chromium E2E executed tests (anti-vacuity, runtime)
        run: node scripts/check-e2e-not-vacuous.mjs --results playwright-chromium.json

      - name: Audit mobile pointer targets
        # Emit JSON so the runtime guard can confirm the mobile spec actually RAN
        # under mobile-safari (isMobile=true) rather than being skipped — the
        # exact failure the review pinned (the mobile check ran 0 specs).
        run: npx playwright test e2e/mobile-pointer-targets.spec.js --project=mobile-safari --reporter=github,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-mobile.json

      - name: Assert mobile pointer-target audit executed tests (anti-vacuity, runtime)
        run: node scripts/check-e2e-not-vacuous.mjs --results playwright-mobile.json

  # Execution tests for the Supabase edge functions (Deno runtime, not vitest).
  # The money-path trust boundaries (stripe-webhook signature verification; later
  # the generate-narrative refund decision) are RUN here against forged vs. signed
  # requests — the regex-over-source contracts in vitest can't prove behavior.
  deno-tests:
    name: Edge function execution tests (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # `deno task check:edge` resolves a transitive `@types/node` type-reference
      # carried by the esm.sh npm shims the money-path functions import (e.g.
      # stripe). This is a Deno-only runner with no node_modules, so provide JUST
      # that one type package — installed in isolation so we do NOT pull the whole
      # app dependency tree (a full `npm ci`) merely to type-check 12 edge files.
      # Verified locally: with only @types/node present, check:edge is green; deno
      # resolves it from node_modules/. (Adopting package.json via deno's
      # nodeModulesDir=none was rejected — it bloats deno.lock with the entire
      # Node tree.)
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Provide @types/node for the edge type-check
        run: |
          npm install --no-save --prefix "$RUNNER_TEMP/types-node" @types/node@22
          mkdir -p node_modules
          cp -R "$RUNNER_TEMP/types-node/node_modules/." node_modules/

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Type-check the money-path edge sources (deno check over the trust-boundary
      # entrypoints + refund policy). This is BLOCKING: a type regression in
      # stripe-webhook / create-checkout / generate-narrative refund logic must
      # not ship. This is how the money-path PRODUCTION code gets type-checked in
      # CI. (test:edge below still runs with --no-check until the edge *.test.ts
      # mock clients are typed to satisfy the handler deps — see deno.json //gate.)
      - name: Type check edge functions (Deno)
        run: deno task check:edge

      # Deno lint over the edge sources. Non-blocking for now (|| true) so a new
      # lint rule can't wedge the gate, but the output is surfaced in the log so
      # drift is visible. Promote to blocking once the edge tree lints clean.
      - name: Lint edge functions (Deno — non-blocking)
        run: deno task lint:edge || true

      - name: Run edge-function Deno tests
        run: deno task test:edge
