name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Validate, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # A+ P0.4: fail the gate on a HIGH+ vulnerability in a PRODUCTION dependency
      # (e.g. the dompurify advisory behind the gallery XSS floor). NOTE: --omit=dev
      # is a RUNTIME-ONLY filter, not a toolchain-safety guarantee — it excludes the
      # build toolchain (esbuild/vite/rollup/postcss/autoprefixer), which produces
      # the shipped bytes. The non-blocking "full audit" step below surfaces those
      # build-toolchain advisories (many need a breaking major bump, so they don't
      # block here) so a supply-chain compromise in the toolchain is at least visible.
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      # Build-toolchain + dev-dependency advisories. Non-blocking (|| true) because
      # they often require a breaking major and shouldn't wedge the gate — but they
      # ARE printed in the log so esbuild/vite/rollup advisories are no longer a
      # blind spot. Promote to blocking once the toolchain is on advisory-clean pins.
      - name: Audit full dependency tree (build toolchain — non-blocking)
        run: npm audit --audit-level=high || true

      # Fail fast on data corruption: duplicate object keys silently
      # overwrite earlier definitions in JS, so a regression here would
      # quietly distort the simulation outputs without breaking the build.
      - name: Validate data
        run: npm run validate:data

      - name: Validate edge functions
        run: npm run validate:edge

      - name: Validate vendored map JavaScript
        run: npm run validate:map

      # tsc --noEmit against src/domain/. The JSDoc types in the domain
      # layer get validated by tsc; the pipeline output object shapes,
      # impairment dimensions, event types, and faction-response shapes
      # are all enforced at edit time. Adding a new event without
      # updating EventType union fails here.
      - name: Type check
        run: npm run typecheck

      # Domain STRICT gate: tsc with strict flags over src/domain (+ the
      # generation path) against a frozen baseline of allowed errors, so new
      # strict violations can't sneak in. `npm run check` and the pre-push hook
      # already run this; CI ran `typecheck` but NOT this, leaving a parity gap
      # where a strict regression could land on master green. Closed here.
      - name: Type check (domain strict)
        run: npm run typecheck:domain:strict

      # ESLint on the full src/ + tests + scripts. Correctness rules
      # (undefined vars, dupe keys, rules-of-hooks, the design-token and
      # analytics-event contracts) are errors; forward-looking React 19
      # rules and unused-vars are warnings, surfaced for drift tracking
      # without blocking. The tree currently lints clean (0 problems).
      # Promote the React 19 warnings to errors when adopting React Compiler.
      - name: Lint
        run: npm run lint

      # Vitest: unit + property-based (fast-check) engine tests, domain +
      # store + lib integration, component/UI smoke, a11y, security, and
      # edge-function contract tests. ~2,600 tests across ~170 files.
      - name: Run tests
        run: npm run test

      # Production build — confirms Vite/Rollup chunking is healthy, the
      # bundle still produces, and (via the vite.config onwarn guard) that
      # no named import is missing/unresolved. NOTE: Vercel currently
      # deploys on push to master independently of this workflow — see
      # docs/DEPLOY.md ("Gating production on CI") to make this check a
      # required gate before a production deploy.
      - name: Build
        run: npm run build

  e2e:
    name: Chromium end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium + webkit)
        # webkit powers the mobile-safari project (iPhone 13 profile) used by
        # the "Audit mobile pointer targets" step below — without it that step
        # fails at browser launch ("Executable doesn't exist … webkit").
        run: npx playwright install --with-deps chromium webkit

      - name: Run Chromium E2E
        run: npx playwright test --project=chromium

      - name: Audit mobile pointer targets
        run: npx playwright test e2e/mobile-pointer-targets.spec.js --project=mobile-safari

  # Execution tests for the Supabase edge functions (Deno runtime, not vitest).
  # The money-path trust boundaries (stripe-webhook signature verification; later
  # the generate-narrative refund decision) are RUN here against forged vs. signed
  # requests — the regex-over-source contracts in vitest can't prove behavior.
  deno-tests:
    name: Edge function execution tests (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Type-check the money-path edge sources (deno check over the trust-boundary
      # entrypoints + refund policy). This is BLOCKING: a type regression in
      # stripe-webhook / create-checkout / generate-narrative refund logic must
      # not ship. This is how the money-path PRODUCTION code gets type-checked in
      # CI. (test:edge below still runs with --no-check until the edge *.test.ts
      # mock clients are typed to satisfy the handler deps — see deno.json //gate.)
      - name: Type check edge functions (Deno)
        run: deno task check:edge

      # Deno lint over the edge sources. Non-blocking for now (|| true) so a new
      # lint rule can't wedge the gate, but the output is surfaced in the log so
      # drift is visible. Promote to blocking once the edge tree lints clean.
      - name: Lint edge functions (Deno — non-blocking)
        run: deno task lint:edge || true

      - name: Run edge-function Deno tests
        run: deno task test:edge
